services:
  api:
    build: ./backend
    ports:
      - "3006:3000"
    environment:
      PORT: 3000
      DB_PATH: /data/app.db
    volumes:
      - ./data:/data

  web:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ""
    ports:
      - "8086:80"
    depends_on:
      - api

  adminer:
    image: adminer:4.8.1
    ports:
      - "9086:8080"
    volumes:
      - ./data:/data
    depends_on:
      - api
